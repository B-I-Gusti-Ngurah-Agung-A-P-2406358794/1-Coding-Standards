<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Order History</h3>

    <form th:action="@{/order/history}" method="post" class="mb-4">
        <div class="form-group">
            <label for="authorSearchInput">Author name</label>
            <input type="text"
                   class="form-control mb-2 col-4"
                   id="authorSearchInput"
                   name="author"
                   placeholder="Enter author name"
                   th:value="${author}">
        </div>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <div th:if="${orders != null}">
        <h5 th:if="${#lists.isEmpty(orders)}">No orders found.</h5>
        <table th:if="${!#lists.isEmpty(orders)}" class="table table-striped">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Author</th>
                <th>Status</th>
                <th>Products Count</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">order-id</td>
                <td th:text="${order.author}">author</td>
                <td th:text="${order.status}">status</td>
                <td th:text="${#lists.size(order.products)}">0</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Pay Order</h3>

    <div th:if="${order == null}">
        <p>Order not found.</p>
    </div>

    <div th:if="${order != null}">
        <p><strong>Order ID:</strong> <span th:text="${order.id}">order-id</span></p>
        <p><strong>Author:</strong> <span th:text="${order.author}">author</span></p>

        <form th:action="@{'/order/pay/' + ${order.id}}" method="post" class="mt-3">
            <div class="form-group">
                <label for="methodSelect">Payment Method</label>
                <select id="methodSelect" name="method" class="form-control mb-3">
                    <option value="VOUCHER">Voucher</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                </select>
            </div>

            <div id="voucherFields" class="mb-3">
                <label for="voucherCodeInput">Voucher Code</label>
                <input type="text" id="voucherCodeInput" name="voucherCode"
                       class="form-control mb-2 col-4"
                       placeholder="Enter voucher code">
            </div>

            <div id="bankTransferFields" class="mb-3">
                <label for="bankNameInput">Bank Name</label>
                <input type="text" id="bankNameInput" name="bankName"
                       class="form-control mb-2 col-4"
                       placeholder="Enter bank name">

                <label for="referenceCodeInput">Reference Code</label>
                <input type="text" id="referenceCodeInput" name="referenceCode"
                       class="form-control mb-2 col-4"
                       placeholder="Enter reference code">
            </div>

            <button type="submit" class="btn btn-primary">Pay</button>
        </form>
    </div>
</div>

<script>
    (function () {
        const methodSelect = document.getElementById('methodSelect');
        const voucherFields = document.getElementById('voucherFields');
        const bankFields = document.getElementById('bankTransferFields');

        function updateVisibility() {
            const method = methodSelect.value;
            voucherFields.style.display = method === 'VOUCHER' ? 'block' : 'none';
            bankFields.style.display = method === 'BANK_TRANSFER' ? 'block' : 'none';
        }

        if (methodSelect) {
            methodSelect.addEventListener('change', updateVisibility);
            updateVisibility();
        }
    })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Payment Admin Detail</h3>

    <div th:if="${payment == null}">
        <p>Payment not found.</p>
    </div>

    <div th:if="${payment != null}">
        <p><strong>ID:</strong> <span th:text="${payment.id}">payment-id</span></p>
        <p><strong>Method:</strong> <span th:text="${payment.method}">method</span></p>
        <p><strong>Status:</strong> <span th:text="${payment.status}">status</span></p>

        <form th:action="@{'/payment/admin/set-status/' + ${payment.id}}" method="post" class="mt-3">
            <button type="submit" name="action" value="accept" class="btn btn-success">Accept</button>
            <button type="submit" name="action" value="reject" class="btn btn-danger">Reject</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>

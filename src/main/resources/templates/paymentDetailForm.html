<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERd`knLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Find Payment Detail</h3>

    <form th:action="@{/payment/detail/__id__}" method="get"
          onsubmit="event.preventDefault(); window.location=this.action.replace('__id__', document.getElementById('paymentIdInput').value);">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input type="text"
                   class="form-control mb-2 col-4"
                   id="paymentIdInput"
                   placeholder="Enter payment ID"
                   required>
        </div>
        <button type="submit" class="btn btn-primary">View Detail</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
